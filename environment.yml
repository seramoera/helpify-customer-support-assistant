name: customer-support-ai
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.10

  # Core
  - numpy
  - pandas
  - scikit-learn

  # NLP
  - nltk
  - spacy
  - gensim

  # Deep Learning
  - pytorch
  - torchvision
  - torchaudio

  # Visualization
  - matplotlib
  - seaborn

  # Notebook
  - jupyter
  - ipykernel

  # Utilities
  - tqdm
  - pip

  - pip:
      - kaggle
      - stable-baselines3
      - gymnasium
      - python-dotenv